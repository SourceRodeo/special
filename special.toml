version = "1"
root = "."
ignore = [
  "CHANGELOG.md",
  "README.md",
  "docs/agents.md",
  "docs/annotations.md",
  "docs/commands.md",
  "docs/configuration.md",
  "docs/contributor/release.md",
  "docs/install.md",
  "docs/tutorial.md",
]

[docs]
entrypoints = ["README.md"]

[[docs.outputs]]
source = "docs/src/public"
output = "docs"

[[docs.outputs]]
source = "docs/src/contributor"
output = "docs/contributor"

[[docs.outputs]]
source = "docs/src/README.md"
output = "README.md"

[health]
ignore-unexplained = [
  "src/language_packs/*/test_fixtures.rs",
  "src/language_packs/*/test_fixtures/**",
  "src/render/html/*_templates.rs",
  "src/render/text/*_templates.rs",
]
